version: "3.9"
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/${COMPOSE_PROJECT_NAME:-ajdin}/ajdin.husic.dev:local
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

